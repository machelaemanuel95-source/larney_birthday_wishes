<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Larney!</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            padding: 50px;
            animation: fadeIn 2s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 { color: #e74c3c; font-size: 3em; }
        .emoji { font-size: 4em; }
        .balloons { font-size: 2em; }
        button {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover { background: #c0392b; }
        .hidden { display: none; }
        .surprise {
            font-size: 3em;
            margin-top: 20px;
        }
        .footer-text {
            margin-top: 20px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji">🎂🎉</div>
        <h1>HAPPY BIRTHDAY<br>LARNEY!</h1>
        <p>🌟 You're amazing and deserve all the happiness today!</p>
        <p>🎈 Enjoy every moment of your special day!</p>
        <p>💝 Wishing you love, laughter, and lots of cake!</p>
        <p>🎁 May your day be as wonderful as you are!</p>
        <div class="balloons">🎈🎈🎈</div>
        <button onclick="showSurprise()">Click for a Surprise! 🎁</button>
        <div id="surprise" class="surprise hidden">
            ✨🌟🥳<br>
            YOU'RE THE BEST, LARNEY!<br>
            🥳🌟✨
        </div>
        <p class="footer-text">💖 From: Your Friend 💖</p>
    </div>
    <script>
        function showSurprise() {
            document.getElementById('surprise').classList.remove('hidden');
            document.getElementById('surprise').style.animation = 'fadeIn 1s';
        }
    </script>
</body>
</html>
